<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成人式 | BELL WELL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f6f2eb;
  color:#3e2f27;
  font-family:'Noto Serif JP',serif;
}

/* HERO */
.hero{
  min-height:80vh;
  background:
  linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.5)),
  url("IMG_3093.png") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:42px;
  letter-spacing:8px;
}

/* SECTION */
.section{
  padding:60px 20px;
}

.title{
  text-align:center;
  font-size:26px;
  margin-bottom:30px;
}

.text{
  text-align:center;
  line-height:2;
}

/* GALLERY */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:10px;
}

/* PRICE */
.price-box{
  background:#fff;
  border:1px solid #d3c2b3;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  line-height:1.8;
}

.price-title{
  font-weight:bold;
  font-size:16px;
  margin-bottom:5px;
}

.price{
  font-size:18px;
  color:#9b7b63;
  margin-bottom:10px;
}

/* BUTTON */
.btn{
  display:block;
  margin:40px auto;
  padding:15px;
  background:#9b7b63;
  color:#fff;
  text-align:center;
  border-radius:30px;
  width:80%;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>成人式</h1>
</section>

<!-- CONCEPT -->
<section class="section">
  <div class="title">CONCEPT</div>
  <p class="text">
    一生に一度の成人式を、<br>
    自分史上最高の美しさで残す。<br><br>
    ヘアメイク・着付け・撮影すべてを通して、<br>
    あなたの魅力を最大限に引き出します。
  </p>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="title">GALLERY</div>

  <div class="grid">
    <img src="IMG_3093.png">
    <img src="IMG_2967.jpeg">

    <img src="IMG_3088.png">
    <img src="IMG_3091.png">

    <img src="IMG_3087.png">
    <img src="IMG_3092.png">
  </div>
</section>

<!-- PRICE -->
<section class="section">
  <div class="title">PRICE</div>

  <div class="price-box">
    <div class="price-title">成人式前撮り</div>
    <div class="price">66,000円</div>
    ヘアアレンジ・メイク・着付け・プロカメラマン撮影
  </div>

  <div class="price-box">
    <div class="price-title">成人式当日</div>
    <div class="price">33,000円</div>
    ヘアアレンジ・メイク・着付け
  </div>

  <div class="price-box">
    <div class="price-title">アルバム</div>
    <div class="price">33,000円〜</div>
    ※オプションとなります
  </div>
</section>

<!-- CONTACT -->
<a href="https://line.me/R/ti/p/@944xywjv" class="btn">
LINEで予約・相談
</a>

</body>
</html>
