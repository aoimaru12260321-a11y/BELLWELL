<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成人式 | BELL WELL</title>

<style>
body{margin:0;background:#f6f2eb;color:#3e2f27;font-family:serif;}

.logo{
  display:block;
  text-align:center;
  padding:25px 0;
  text-decoration:none;
  color:#3e2f27;
  font-size:26px;
  letter-spacing:5px;
}

.hero{
  min-height:70vh;
  background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),url("IMG_3093.png") center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.section{padding:50px 20px;}
.title{text-align:center;font-size:26px;margin-bottom:25px;}
.text{text-align:center;line-height:2;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.price-box{
  background:#fff;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  line-height:1.8;
}

.home-btn,.btn{
  display:block;
  margin:20px auto;
  padding:15px;
  width:80%;
  text-align:center;
  border-radius:30px;
  text-decoration:none;
}

.home-btn{border:1px solid #9b7b63;color:#9b7b63;}
.btn{background:#9b7b63;color:#fff;}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.lightbox img{
  max-width:92%;
  max-height:85%;
  border-radius:10px;
}

.lightbox span{
  position:absolute;
  top:20px;
  right:25px;
  color:#fff;
  font-size:34px;
}
</style>
</head>

<body>

<a href="index.html" class="logo">BELL WELL</a>

<section class="hero">
  <h1>成人式</h1>
</section>

<section class="section">
  <div class="title">CONCEPT</div>
  <p class="text">
    一生に一度の成人式を、<br>
    自分史上最高の美しさで残す。
  </p>
</section>

<section class="section">
  <div class="title">GALLERY</div>

  <div class="grid">
    <img src="IMG_3093.png">
    <img src="IMG_3088.png">
    <img src="IMG_3091.png">
    <img src="IMG_3087.png">
    <img src="IMG_3092.png">
    <img src="IMG_3094.png">
    <img src="IMG_3085.png">
    <img src="IMG_3086.png">
  </div>
</section>

<section class="section">
  <div class="title">PRICE</div>

  <div class="price-box">
    成人式前撮り 66,000円<br>
    ヘアアレンジ・メイク・着付け・プロカメラマン撮影
  </div>

  <div class="price-box">
    成人式当日 33,000円<br>
    ヘアアレンジ・メイク・着付け
  </div>

  <div class="price-box">
    アルバム 33,000円〜
  </div>
</section>

<a href="index.html" class="home-btn">トップページへ戻る</a>
<a href="https://line.me/R/ti/p/@944xywjv" class="btn">LINEで予約・相談</a>

<div class="lightbox" id="lightbox">
  <span onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll(".grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightboxImg.src = img.src;
    lightbox.style.display = "flex";
  });
});

function closeLightbox(){
  lightbox.style.display = "none";
}

lightbox.addEventListener("click", function(e){
  if(e.target === lightbox){
    closeLightbox();
  }
});
</script>

</body>
</html>
