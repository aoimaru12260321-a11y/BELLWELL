<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELLWELL</title>

<style>
body {
  margin: 0;
  font-family: serif;
  background: #f8f6f3;
}

/* ヒーロー */
.hero {
  height: 70vh;
  background: url("IMG_3078.jpeg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 32px;
  letter-spacing: 3px;
}

/* セクション */
.section {
  padding: 40px 20px;
}

/* カード */
.menu {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.menu a {
  position: relative;
  display: block;
}

.menu img {
  width: 100%;
  border-radius: 10px;
}

.menu span {
  position: absolute;
  bottom: 15px;
  left: 15px;
  color: white;
  font-size: 20px;
}

/* ギャラリー */
.gallery {
  padding: 40px 20px;
}

.gallery h2 {
  text-align: center;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.grid img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
}

/* ボタン */
.btn {
  display: block;
  margin: 40px auto;
  padding: 15px;
  background: #a1846b;
  color: white;
  text-align: center;
  border-radius: 30px;
  width: 80%;
}
</style>

</head>

<body>

<!-- ヒーロー -->
<section class="hero">
  <h1>BRIDAL<br>PHOTO WEDDING</h1>
</section>

<!-- メニュー -->
<section class="section menu">

  <a href="#">
    <img src="IMG_3077.jpeg">
    <span>BRIDAL</span>
  </a>

  <a href="#">
    <img src="IMG_2931.jpeg">
    <span>SEIJIN</span>
  </a>

  <a href="#">
    <img src="IMG_3106.png">
    <span>753</span>
  </a>

</section>

<!-- ブライダルギャラリー -->
<section class="gallery">
  <h2>BRIDAL GALLERY</h2>

  <div class="grid">

    <img src="IMG_3055.jpeg">
    <img src="IMG_3056.jpeg">
    <img src="IMG_3057.jpeg">
    <img src="IMG_3062.jpeg">
    <img src="IMG_3066.jpeg">
    <img src="IMG_3067.jpeg">
    <img src="IMG_3068.jpeg">
    <img src="IMG_3069.jpeg">
    <img src="IMG_3071.jpeg">
    <img src="IMG_3075.png">
    <img src="IMG_3077.jpeg">
    <img src="IMG_3078.jpeg">
    <img src="IMG_3079.jpeg">
    <img src="IMG_3080.jpeg">
    <img src="IMG_3082.jpeg">
    <img src="IMG_3083.jpeg">

  </div>
</section>

<!-- ボタン -->
<a href="#" class="btn">LINEで予約・相談</a>

</body>
</html>
