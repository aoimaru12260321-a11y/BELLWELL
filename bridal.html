<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIDAL | BELL WELL</title>

<style>
body{
  margin:0;
  background:#f6f2eb;
  color:#3e2f27;
  font-family:serif;
}

/* ロゴ */
.logo{
  display:block;
  text-align:center;
  padding:25px 0;
  text-decoration:none;
  color:#3e2f27;
  font-size:26px;
  letter-spacing:5px;
}

/* HERO */
.hero{
  min-height:70vh;
  background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),url("IMG_3069.jpeg") center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* 共通 */
.section{padding:50px 20px;}
.title{text-align:center;font-size:26px;margin-bottom:25px;}
.text{text-align:center;line-height:2;}

/* GALLERY */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* ボタン */
.home-btn,.btn{
  display:block;
  margin:20px auto;
  padding:15px;
  width:80%;
  text-align:center;
  border-radius:30px;
  text-decoration:none;
}

.home-btn{
  border:1px solid #9b7b63;
  color:#9b7b63;
}

.btn{
  background:#9b7b63;
  color:#fff;
}

/* lightbox */
.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.lightbox img{
  max-width:85%;
  max-height:80%;
  border-radius:10px;
}

.lightbox span{
  position:absolute;
  top:20px;
  right:25px;
  color:#fff;
  font-size:34px;
}
</style>
</head>

<body>

<!-- ロゴ -->
<a href="index.html" class="logo">BELL WELL</a>

<!-- HERO -->
<section class="hero">
  <h1>BRIDAL</h1>
</section>

<!-- CONCEPT -->
<section class="section">
  <div class="title">CONCEPT</div>
  <p class="text">
    ただ撮るだけじゃない。<br>
    一生に一度を、最高の美しさで残す。
  </p>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="title">GALLERY</div>

  <div class="grid">

    <img src="IMG_3069.jpeg">
    <img src="IMG_3077.jpeg">

    <img src="IMG_3057.jpeg">
    <img src="IMG_2945.jpeg">

    <img src="IMG_3051.jpeg">
    <img src="IMG_3052.jpeg">

    <img src="IMG_3062.jpeg">
    <img src="IMG_3056.jpeg">

  </div>
</section>

<!-- ボタン -->
<a href="index.html" class="home-btn">トップページへ戻る</a>
<a href="https://line.me/R/ti/p/@944xywjv" class="btn">LINEで予約・相談</a>

<!-- lightbox -->
<div class="lightbox" id="lightbox">
  <span onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll(".grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightboxImg.src = img.src;
    lightbox.style.display = "flex";
  });
});

function closeLightbox(){
  lightbox.style.display = "none";
}

lightbox.addEventListener("click", function(e){
  if(e.target === lightbox){
    closeLightbox();
  }
});
</script>

</body>
</html>
