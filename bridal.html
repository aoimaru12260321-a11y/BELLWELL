<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELLWELL BRIDAL</title>

<style>
body {
  margin: 0;
  font-family: serif;
  background: #f8f6f3;
}

/* タイトル */
.gallery {
  padding: 40px 20px;
}

.gallery h2 {
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 30px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* 画像 */
.grid img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.4s;
}

/* ホバー */
.grid img:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<section class="gallery">
  <h2>GALLERY</h2>

  <div class="grid">

    <img src="IMG_3055.jpeg">
    <img src="IMG_3056.jpeg">
    <img src="IMG_3057.jpeg">
    <img src="IMG_3062.jpeg">
    <img src="IMG_3066.jpeg">
    <img src="IMG_3067.jpeg">
    <img src="IMG_3068.jpeg">
    <img src="IMG_3069.jpeg">
    <img src="IMG_3071.jpeg">
    <img src="IMG_3075.png">

    <img src="IMG_3077.jpeg">
    <img src="IMG_3078.jpeg">
    <img src="IMG_3079.jpeg">
    <img src="IMG_3080.jpeg">
    <img src="IMG_3082.jpeg">
    <img src="IMG_3083.jpeg">

  </div>
</section>

</body>
</html>
