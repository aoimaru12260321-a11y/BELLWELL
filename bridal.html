<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIDAL | BELL WELL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f6f2eb;
  color:#3e2f27;
  font-family:'Noto Serif JP',serif;
}

/* HERO */
.hero{
  min-height:75vh;
  background:
    linear-gradient(rgba(246,242,235,.2),rgba(246,242,235,.85)),
    url("IMG_2957.jpeg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 24px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:42px;
  letter-spacing:10px;
}

.section{
  padding:50px 20px;
}

.title{
  text-align:center;
  font-family:'Playfair Display',serif;
  letter-spacing:5px;
  font-size:26px;
  margin-bottom:25px;
}

/* GALLERY */
.gallery-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

.gallery-grid img{
  width:100%;
  border-radius:6px;
}

/* PRICE */
.price-card{
  background:#fff;
  padding:20px;
  margin-bottom:15px;
  border-radius:8px;
}

.price{
  font-size:20px;
  color:#8a6b55;
}

/* LINE */
.fixed-line{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:#8a6b55;
  color:#fff;
  text-align:center;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">
  <h1>BRIDAL</h1>
</section>

<section class="section">
  <div class="title">GALLERY</div>

  <div class="gallery-grid">
    <img src="IMG_2957.jpeg">
    <img src="IMG_2958.jpeg">
    <img src="IMG_2959.jpeg">
    <img src="IMG_2960.jpeg">
    <img src="IMG_2961.jpeg">
    <img src="IMG_2962.jpeg">
  </div>
</section>

<section class="section">
  <div class="title">PLAN</div>

  <div class="price-card">
    <div class="price">¥98,000〜</div>
    持ち込み衣装フォトプラン
  </div>

  <div class="price-card">
    <div class="price">¥250,000〜</div>
    衣装付きプラン
  </div>

  <div class="price-card">
    <div class="price">¥265,000〜</div>
    インポートドレスプラン
  </div>

  <div class="price-card">
    <div class="price">¥297,000〜</div>
    和装プラン
  </div>

</section>

<a href="https://line.me/R/ti/p/@944xywjv" class="fixed-line">
LINEで予約・相談
</a>

</body>
</html>
