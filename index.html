<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELL WELL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow-x:hidden;
  background:#f6f2eb;
  font-family:'Noto Serif JP',serif;
}

/* 🔥 ヒーロー */
.hero{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

/* 🔥 画像（黒完全消し） */
.hero-bg{
  position:absolute;
  top:50%;
  left:50%;
  width:auto;
  height:120%;
  min-width:100%;
  min-height:100%;
  transform:translate(-50%,-50%) scale(1.6);
  object-fit:cover;
  filter:brightness(.78);
}

/* 🔥 透け＋高級感 */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.35)
  );
  z-index:1;
}

/* 🔥 中央 */
.hero-content{
  position:relative;
  z-index:2;
  padding:20px;
}

/* 🔥 ロゴ */
.logo{
  font-family:'Playfair Display',serif;
  font-size:56px;
  letter-spacing:14px;
  line-height:1.3;
  margin-bottom:18px;
}

/* 🔥 サブ */
.sub{
  font-size:13px;
  letter-spacing:6px;
  margin-bottom:50px;
}

/* 🔥 キャッチ */
.catch{
  font-size:19px;
  line-height:2;
  margin-bottom:40px;
  text-shadow:0 2px 10px rgba(0,0,0,0.4);
}

/* 🔥 ボタン */
.hero-btn{
  display:inline-block;
  padding:15px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  letter-spacing:1px;
}

/* 🔥 固定CTA */
.fixed-line{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:88%;
  max-width:420px;
  background:#9b7b63;
  color:#fff;
  text-align:center;
  padding:16px 0;
  border-radius:999px;
  text-decoration:none;
  z-index:10;
  font-size:16px;
}
</style>
</head>

<body>

<section class="hero">
  <img src="IMG_3113.png" class="hero-bg">

  <div class="hero-content">
    <div class="logo">BELL<br>WELL</div>
    <div class="sub">PHOTO SERVICE</div>

    <div class="catch">
      一生に一度を、<br>
      ただの写真で終わらせない。
    </div>

    <a href="https://line.me/R/ti/p/@944xywjv" class="hero-btn">
      LINEで無料相談する
    </a>
  </div>
</section>

<a href="https://line.me/R/ti/p/@944xywjv" class="fixed-line">
LINEで予約・相談
</a>

</body>
</html>
