<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELL WELL</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:0;
  background:#f6f2eb;
  font-family:'Noto Serif JP', serif;
}

/* 🔥 全画面ヒーロー */
.hero{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* 🔥 画像を完全フルスクリーン */
.hero img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 透けフィルター */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(246,242,235,0.4);
  top:0;
  left:0;
}

/* 🔥 テキスト中央 */
.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
  padding:20px;
}

h1{
  font-size:40px;
  letter-spacing:8px;
  margin:0;
}

.sub{
  letter-spacing:4px;
  font-size:14px;
  margin-top:10px;
}

.catch{
  margin-top:40px;
  font-size:18px;
  line-height:1.8;
}

/* 🔥 ボタン */
.btn{
  margin-top:40px;
  padding:14px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* 下固定ボタン */
.fixed-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:#9b7b63;
  color:#fff;
  text-align:center;
  padding:16px;
  border-radius:40px;
  text-decoration:none;
  font-size:16px;
}
</style>
</head>

<body>

<section class="hero">
  <!-- ここ画像パス -->
  <img src="IMG_3113.png">

  <div class="hero-content">
    <h1>BELL WELL</h1>
    <div class="sub">PHOTO SERVICE</div>

    <div class="catch">
      ただ撮るだけじゃない。<br>
      「選ばれる1枚」を残す。
    </div>

    <a href="#" class="btn">LINEで無料相談する</a>
  </div>
</section>

<a href="#" class="fixed-btn">LINEで予約・相談</a>

</body>
</html>
