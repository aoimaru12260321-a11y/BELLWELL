<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELL WELL</title>

<style>
body{
  margin:0;
  background:#f6f2eb;
  font-family:serif;
}

/* HERO */
.hero{
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.5)),
    url("IMG_3057.jpeg") center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-align:center;
}

.logo{
  font-size:40px;
  letter-spacing:10px;
}

.catch{
  margin-top:20px;
  line-height:2;
}

/* SECTION */
.section{
  padding:80px 20px;
}

.title{
  text-align:center;
  font-size:28px;
  margin-bottom:40px;
  letter-spacing:4px;
}

.text{
  text-align:center;
  line-height:2;
}

/* SERVICE */
.menu{
  display:grid;
  gap:20px;
}

.card{
  position:relative;
  height:260px;
  border-radius:16px;
  overflow:hidden;
  text-decoration:none;
  color:#fff;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.65);
}

/* TEXT */
.card-content{
  position:absolute;
  bottom:20px;
  left:20px;
}

.card-title{
  font-size:28px;
}

/* BOX */
.box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
  line-height:1.8;
}

/* BTN */
.btn{
  display:block;
  margin:30px auto 100px;
  padding:15px;
  width:80%;
  max-width:400px;
  text-align:center;
  background:#9b7b63;
  color:#fff;
  border-radius:30px;
  text-decoration:none;
}

/* FADE */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:.8s;
}

.fade.show{
  opacity:1;
  transform:none;
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <div class="logo">BELL WELL</div>
    <div class="catch">
      一生に一度を、<br>
      ただの写真で終わらせない。
    </div>
  </div>
</section>

<section class="section fade">
  <div class="title">ABOUT</div>
  <p class="text">
    ヘアメイクがプロデュースするフォトサービス。<br>
    その人らしい美しさを引き出します。
  </p>
</section>

<section class="section fade">
  <div class="title">SERVICE</div>

  <div class="menu">

    <a href="bridal.html" class="card">
      <img src="IMG_3069.jpeg">
      <div class="card-content">
        <div class="card-title">BRIDAL</div>
      </div>
    </a>

    <a href="seijin.html" class="card">
      <img src="IMG_3092.jpeg">
      <div class="card-content">
        <div class="card-title">成人式</div>
      </div>
    </a>

    <a href="753.html" class="card">
      <img src="IMG_3041.jpeg">
      <div class="card-content">
        <div class="card-title">七五三</div>
      </div>
    </a>

  </div>
</section>

<section class="section fade">
  <div class="title">WHY</div>

  <div class="box">
    ただ撮るだけではなく、その人らしい美しさを引き出します。
  </div>

  <div class="box">
    ヘアメイク・撮影までトータルサポート。
  </div>
</section>

<a href="https://line.me/R/ti/p/@944xywjv" class="btn">
LINEで予約・相談
</a>

<script>
const fades=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
  fades.forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight-100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
