<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELL WELL</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

header {
    position: fixed;
    width: 100%;
    padding: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

header h1 {
    margin: 0;
    font-weight: 300;
    letter-spacing: 2px;
}

.hero {
    height: 100vh;
    background: url('https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/top.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero h2 {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 4px;
}

.section {
    padding: 100px 20px;
    text-align: center;
}

.section h3 {
    font-size: 28px;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
}

.grid img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    transition: 0.4s;
}

.grid img:hover {
    transform: scale(1.05);
}

.concept {
    background: url('https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/concept.jpg') center/cover no-repeat;
    padding: 200px 20px;
}

.concept p {
    max-width: 600px;
    margin: auto;
    line-height: 1.8;
}

footer {
    text-align: center;
    padding: 50px;
    background: #000;
}
</style>

</head>
<body>

<header>
    <h1>BELL WELL</h1>
</header>

<section class="hero">
    <h2>FOR YOUR SPECIAL DAY</h2>
</section>

<section class="section concept">
    <h3>CONCEPT</h3>
    <p>
    ヘアメイクが創る、特別な一日。<br>
    外見だけでなく、内面から輝く美しさを。<br>
    あなた史上、最高の瞬間を。
    </p>
</section>

<section class="section">
    <h3>BRIDAL</h3>
    <div class="grid">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/bridal1.jpg">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/bridal2.jpg">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/bridal3.jpg">
    </div>
</section>

<section class="section">
    <h3>COUPLE</h3>
    <div class="grid">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/couple1.jpg">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/couple2.jpg">
    </div>
</section>

<section class="section">
    <h3>SEIJIN</h3>
    <div class="grid">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/seijin1.jpg">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/seijin2.jpg">
    </div>
</section>

<section class="section">
    <h3>GALLERY</h3>
    <div class="grid">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/gallery1.jpg">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/gallery2.jpg">
        <img src="https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/gallery3.jpg">
    </div>
</section>

<footer>
    <p>BELL WELL</p>
</footer>

</body>
</html>
