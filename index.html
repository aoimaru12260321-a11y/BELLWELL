  width:100%;
  padding:22px 28px;
  background:rgba(0,0,0,.55);
  z-index:10;
}
header h1{
  margin:0;
  font-size:28px;
  font-weight:300;
  letter-spacing:8px;
}
.hero{
  height:100vh;
  background:
  linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.55)),
  url("https://raw.githubusercontent.com/aoimaru12260321-a11y/BELLWELL/main/IMG_2933.jpeg") center/cover no-repeat;

}

  font-size:42px;
  font-weight:300;
  letter-spacing:5px;
  line-height:1.6;
}
.section{
  padding:90px 18px;
  text-align:center;
}
.section h3{
  font-size:30px;
  letter-spacing:6px;
  margin-bottom:18px;
}
.section p{
  line-height:2;
  color:#ddd;
}
.btns{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}
.btn{
  color:#fff;
  border:1px solid #fff;
  text-decoration:none;
  padding:14px 34px;
  letter-spacing:2px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
  margin-top:40px;
}
.grid img{
  width:100%;
  height:390px;
  object-fit:cover;
}
.wide img{
  height:520px;
}
footer{
  text-align:center;
  padding:50px;
  background:#000;
  letter-spacing:4px;
}
</style>
</head>
