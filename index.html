<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELL WELL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#f6f2eb;
  font-family:'Noto Serif JP',serif;
}

.hero{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

.hero-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  transform:scale(1.45);
  filter:brightness(.82);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(246,242,235,.22);
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
  padding:20px;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:54px;
  letter-spacing:12px;
  line-height:1.35;
  margin-bottom:18px;
}

.sub{
  font-size:13px;
  letter-spacing:5px;
  margin-bottom:46px;
}

.catch{
  font-size:18px;
  line-height:2;
  margin-bottom:35px;
}

.hero-btn{
  display:inline-block;
  padding:14px 38px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  letter-spacing:1px;
}

.fixed-line{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  width:86%;
  max-width:420px;
  background:#9b7b63;
  color:#fff;
  text-align:center;
  padding:16px 0;
  border-radius:999px;
  text-decoration:none;
  z-index:10;
}
</style>
</head>

<body>

<section class="hero">
  <img src="IMG_3113.png" class="hero-bg">

  <div class="hero-content">
    <div class="logo">BELL<br>WELL</div>
    <div class="sub">PHOTO SERVICE</div>

    <div class="catch">
      ただ撮るだけじゃない。<br>
      「選ばれる1枚」を残す。
    </div>

    <a href="https://line.me/R/ti/p/@944xywjv" class="hero-btn">
      LINEで無料相談する
    </a>
  </div>
</section>

<a href="https://line.me/R/ti/p/@944xywjv" class="fixed-line">
LINEで予約・相談
</a>

</body>
</html>
