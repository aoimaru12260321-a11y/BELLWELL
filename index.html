<style>
body{
  margin:0;
  background:#050505;
  color:#fff;

}

/* ロゴ */
.logo{
  text-align:center;
  margin-top:60px;

.logo-main{

  letter-spacing:16px;

}

.logo-sub{
  font-family:'Cormorant Garamond', serif;
  font-size:12px;
  letter-spacing:4px;
  margin-top:10px;
  opacity:.7;
}

/* ヒーロー */
.hero{
  height:80vh;
  background:
    linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.7)),

  flex-direction:column;

  text-align:center;

.catch{

  font-size:14px;
  line-height:2;
  opacity:.9;
}

/* カード */
.menu{
  padding:40px 20px 100px;
}

.card{
  position:relative;
  margin-bottom:20px;
  height:220px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.65);
}

.card-title{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:22px;
  letter-spacing:4px;
}

.card-sub{
  position:absolute;
  bottom:50px;
  left:20px;
  font-size:12px;
  opacity:.7;
}

.card a{
  position:absolute;
  inset:0;
}

/* LINE固定 */
.fixed-line{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:86%;
  max-width:420px;
  background:#06C755;
  color:#fff;
  text-align:center;
  padding:16px 0;
  border-radius:999px;
  text-decoration:none;
  font-weight:bold;
  z-index:9999;
}

/* フッター */
footer{
  text-align:center;
  padding:40px 0 100px;
  opacity:.4;
  letter-spacing:4px;
}
